<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Joventy — Visa USA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{width:100vw;height:100vh;overflow:hidden;font-family:'Inter',sans-serif;background:#f2f2f2;}

  .ad{
    position:relative;
    width:100vw;
    height:100vh;
    background:linear-gradient(135deg,#f5f5f7 0%,#eaeaed 100%);
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }

  /* ── BACKGROUND CIRCLES (decorative, like template) ── */
  .bg-circle-1{
    position:absolute;
    right:-8vw;top:10vw;
    width:45vw;height:45vw;
    border-radius:50%;
    background:rgba(200,210,240,0.18);
  }
  .bg-circle-2{
    position:absolute;
    right:5vw;top:22vw;
    width:28vw;height:28vw;
    border-radius:50%;
    background:rgba(200,210,240,0.12);
  }

  /* ── TOP BAR ── */
  .top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:3.5vw 4.5vw 2.5vw;
    flex-shrink:0;
  }
  .logo{
    display:flex;align-items:center;gap:2vw;
  }
  .logo-box{
    width:9vw;height:9vw;
    background:#f97316;
    border-radius:2vw;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  .logo-box img{width:6vw;height:6vw;object-fit:contain;filter:brightness(0) invert(1);}
  .logo-name{font-size:5.5vw;font-weight:900;color:#1e3a8a;letter-spacing:-0.03em;}

  .social-row{
    display:flex;align-items:center;gap:1.5vw;
  }
  .social-label{font-size:2.6vw;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin-right:1vw;}
  .social-icon{
    width:5.5vw;height:5.5vw;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:2.8vw;font-weight:700;color:white;
  }
  .si-fb{background:#1877f2;}
  .si-ig{background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);}
  .si-wa{background:#25d366;}
  .si-yt{background:#ff0000;}

  /* ── MAIN BODY ── */
  .body{
    display:flex;
    flex:1;
    padding:0 4.5vw;
    gap:3vw;
    overflow:hidden;
  }

  /* LEFT COLUMN */
  .left{
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
    flex:0 0 48%;
    padding-top:1vw;
  }

  .headline-small{
    font-size:3.8vw;font-style:italic;color:#444;font-weight:400;line-height:1;margin-bottom:0.5vw;
  }
  .headline-med{
    font-size:7.5vw;font-weight:700;color:#f97316;line-height:1;margin-bottom:0.2vw;
    font-style:italic;
  }
  .headline-big{
    font-size:13.5vw;font-weight:900;color:#f97316;line-height:0.9;margin-bottom:0.3vw;
    letter-spacing:-0.03em;
  }
  .headline-country{
    font-size:10vw;font-weight:900;color:#1e3a8a;line-height:0.95;
    letter-spacing:-0.03em;margin-bottom:1vw;
  }
  .headline-sub{
    font-size:3.2vw;font-weight:600;color:#666;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:2.5vw;
  }

  /* Photo panels */
  .photos{
    position:relative;
    height:26vw;
    margin-bottom:1.5vw;
  }
  .photo-card{
    position:absolute;
    border-radius:2.5vw;
    overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,0.18);
    border:3px solid white;
  }
  .photo-card img{width:100%;height:100%;object-fit:cover;}
  .photo-1{
    width:28vw;height:18vw;
    top:0;left:0;
    transform:rotate(-3deg);
    z-index:2;
  }
  .photo-2{
    width:25vw;height:17vw;
    top:7vw;left:8vw;
    transform:rotate(2deg);
    z-index:3;
  }

  /* Orange offer badge */
  .badge{
    position:absolute;
    bottom:-2vw;
    left:26vw;
    background:#f97316;
    color:white;
    border-radius:1.5vw;
    padding:2vw 3vw;
    text-align:center;
    box-shadow:0 4px 16px rgba(249,115,22,0.45);
    z-index:10;
    min-width:18vw;
  }
  .badge-top{font-size:2.8vw;font-weight:600;line-height:1;}
  .badge-big{font-size:8vw;font-weight:900;line-height:1;}
  .badge-sub{font-size:2.5vw;font-weight:600;line-height:1.2;opacity:0.9;}

  /* RIGHT COLUMN */
  .right{
    flex:1;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    align-items:center;
    overflow:hidden;
  }

  .hero-container{
    position:relative;
    width:100%;
    height:85%;
  }
  .hero-img{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    height:100%;
    width:auto;
    max-width:130%;
    object-fit:contain;
    object-position:bottom center;
    filter:drop-shadow(0 8px 24px rgba(0,0,0,0.2));
  }

  /* Flag overlay on hero */
  .flag-overlay{
    position:absolute;
    top:3vw;
    right:1vw;
    display:flex;
    align-items:center;
    gap:1.5vw;
    background:rgba(255,255,255,0.92);
    border-radius:2vw;
    padding:1.5vw 2.5vw;
    box-shadow:0 2px 12px rgba(0,0,0,0.15);
  }
  .flag-overlay img{width:7vw;border-radius:0.5vw;}
  .flag-label{font-size:3.2vw;font-weight:800;color:#1e3a8a;}

  /* Accent decorative bars (like in template) */
  .deco-bars{
    position:absolute;
    right:0;
    top:50%;
    transform:translateY(-50%);
    display:flex;flex-direction:column;gap:1.5vw;
  }
  .deco-bar{height:1.2vw;background:#f97316;border-radius:1vw 0 0 1vw;}

  /* ── BOTTOM WAVE ── */
  .bottom-wave{
    position:relative;
    flex-shrink:0;
    height:20vw;
    margin-top:auto;
  }
  .wave-svg{
    position:absolute;
    bottom:0;left:0;right:0;
    width:100%;height:100%;
  }
  .bottom-content{
    position:absolute;
    bottom:0;left:0;right:0;
    height:13vw;
    display:flex;
    align-items:center;
    padding:0 5vw;
    gap:0;
    z-index:2;
  }
  .cta-btn{
    display:flex;align-items:center;gap:2vw;
    background:#1e3a8a;
    color:white;
    font-size:3.8vw;font-weight:800;
    padding:2.5vw 5vw;
    border-radius:50vw;
    text-decoration:none;
    white-space:nowrap;
    box-shadow:0 3px 14px rgba(30,58,138,0.35);
  }
  .cta-btn .arrow-box{
    width:5vw;height:5vw;
    background:rgba(255,255,255,0.2);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
  }
  .cta-btn .arrow-box svg{width:3vw;height:3vw;}

  .divider{
    width:0.3vw;
    height:9vw;
    background:rgba(255,255,255,0.5);
    margin:0 5vw;
    flex-shrink:0;
  }
  .contact-block{display:flex;flex-direction:column;gap:0.8vw;}
  .contact-phone{font-size:5vw;font-weight:900;color:#f97316;line-height:1;}
  .contact-url{font-size:3vw;font-weight:600;color:rgba(255,255,255,0.85);letter-spacing:0.03em;}
</style>
</head>
<body>
<div class="ad">
  <!-- Background decorative circles -->
  <div class="bg-circle-1"></div>
  <div class="bg-circle-2"></div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">
      <div class="logo-box">
        <img src="/__mockup/images/joventy-icon.png" alt="Joventy"/>
      </div>
      <span class="logo-name">Joventy</span>
    </div>
    <div class="social-row">
      <span class="social-label">Suivez-nous</span>
      <div class="social-icon si-fb">f</div>
      <div class="social-icon si-ig">◎</div>
      <div class="social-icon si-wa">✆</div>
      <div class="social-icon si-yt">▶</div>
    </div>
  </div>

  <!-- MAIN BODY -->
  <div class="body">

    <!-- LEFT -->
    <div class="left">
      <div class="headline-small">Il est temps de</div>
      <div class="headline-med">Voyager aux</div>
      <div class="headline-big">ÉTATS-</div>
      <div class="headline-country">UNIS</div>
      <div class="headline-sub">Nous gérons votre visa !</div>

      <!-- Photos -->
      <div class="photos">
        <div class="photo-card photo-1">
          <img src="/__mockup/images/ad-usa-hero.png" alt="Voyage USA" style="object-position:center top;"/>
        </div>
        <div class="photo-card photo-2">
          <img src="/__mockup/images/ad-usa-hero.png" alt="Voyage USA" style="object-position:center 60%;"/>
        </div>
        <!-- Badge -->
        <div class="badge">
          <div class="badge-top">Dès</div>
          <div class="badge-big">150$</div>
          <div class="badge-sub">de service</div>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="deco-bars">
        <div class="deco-bar" style="width:4vw;"></div>
        <div class="deco-bar" style="width:2.5vw;background:#1e3a8a;"></div>
        <div class="deco-bar" style="width:3.5vw;"></div>
      </div>

      <div class="flag-overlay">
        <img src="https://flagcdn.com/w40/us.png" alt="USA"/>
        <span class="flag-label">Visa USA</span>
      </div>

      <div class="hero-container">
        <img class="hero-img" src="/__mockup/images/ad-usa-hero.png" alt="Voyageur"/>
      </div>
    </div>

  </div>

  <!-- BOTTOM WAVE -->
  <div class="bottom-wave">
    <svg class="wave-svg" viewBox="0 0 1080 220" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,80 C200,160 400,20 600,80 C800,140 950,40 1080,80 L1080,220 L0,220 Z" fill="#1e3a8a" opacity="0.15"/>
      <path d="M0,100 C180,40 380,160 600,100 C820,40 950,120 1080,90 L1080,220 L0,220 Z" fill="#f97316"/>
    </svg>
    <div class="bottom-content">
      <a class="cta-btn" href="#">
        <div class="arrow-box">
          <svg viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        DÉMARRER
      </a>
      <div class="divider"></div>
      <div class="contact-block">
        <span class="contact-phone">+243 840 808 122</span>
        <span class="contact-url">www.joventy.cd</span>
      </div>
    </div>
  </div>

</div>
</body>
</html>
