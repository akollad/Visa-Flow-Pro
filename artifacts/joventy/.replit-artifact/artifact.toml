kind = "web"
previewPath = "/"
title = "Joventy.cd — Visa Premium RDC"
version = "1.0.0"
id = "artifacts/joventy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18205

[services.development]
run = "pnpm --filter @workspace/joventy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/joventy", "run", "build" ]
publicDir = "artifacts/joventy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18205"
BASE_PATH = "/"
